<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard — BhoomiFi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .dashboard-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .dashboard-card h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--dark-green);
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }
        .data-row:last-of-type {
            border-bottom: none;
        }
        .data-label {
            font-weight: 600;
            color: var(--text-light);
        }
        .data-value {
            font-weight: 700;
            color: var(--text-main);
        }
        .score-display {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-green);
            margin: 1.5rem 0;
        }
        .status-badge {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-weight: 600;
            margin-top: 1rem;
        }
        .status-eligible {
            background-color: rgba(76, 175, 80, 0.15);
            color: var(--dark-green);
        }
        .status-not-eligible {
            background-color: rgba(220, 53, 69, 0.15);
            color: #dc3545;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .no-data {
            color: var(--text-light);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-card">
            <h1>🌾 Farmer Dashboard</h1>
            <div id="dashboardContent">
                <p class="no-data">Loading your data...</p>
            </div>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('dashboardContent');
            const data = localStorage.getItem('farmerData');

            if (!data) {
                content.innerHTML = '<p class="no-data">No data found. Please submit your farm details first.</p>';
                return;
            }

            const farmer = JSON.parse(data);
            const isEligible = farmer.harvestScore >= 60;

            content.innerHTML = `
                <div class="data-row">
                    <span class="data-label">Crop Type</span>
                    <span class="data-value">${farmer.cropType}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Land Size</span>
                    <span class="data-value">${farmer.landSize} Acres</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Location</span>
                    <span class="data-value">${farmer.location}</span>
                </div>
                <div class="score-display">${farmer.harvestScore}</div>
                <p style="color: var(--text-light); margin-bottom: 1rem;">Harvest Score</p>
                <div class="status-badge ${isEligible ? 'status-eligible' : 'status-not-eligible'}">
                    ${isEligible ? '✅ Eligible for Loan' : '❌ Not Eligible'}
                </div>
            `;
        });
    </script>
</body>
</html>
